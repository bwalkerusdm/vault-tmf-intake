openapi: 3.0.0
info:
  title: List Box Inbox
  version: 1.0.0
servers:
- url: https://vault-tmf-intake.vercel.app
security:
- bearerAuth: []
paths:
  /api/etmf/actions/list_inbox.py:
    post:
      operationId: listInbox
      summary: List documents waiting in the Box 1-Inbox
      description: Returns the files currently in the intake folder. Archives are flagged so the agent
        can expand them first.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: The inbox contents
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      type: object
                      properties:
                        box_file_id:
                          type: string
                        filename:
                          type: string
                        is_archive:
                          type: boolean
                  count:
                    type: integer
                  archives:
                    type: integer
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Use the GLEAN_BEARER_TOKEN value configured on the project.
